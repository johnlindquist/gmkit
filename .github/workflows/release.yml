name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # gmcli: pure-Go, cross-compiled for all targets from one runner.
  gmcli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # gmtui: Rust builds per target. Both darwin targets cross-compile from
  # the arm64 runner — Intel macOS runners queue for too long.
  gmtui:
    needs: gmcli # goreleaser creates the release; these jobs attach to it
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin_arm64
            triple: aarch64-apple-darwin
          - os: macos-14
            target: darwin_amd64
            triple: x86_64-apple-darwin
          - os: ubuntu-latest
            target: linux_amd64
            triple: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: linux_arm64
            triple: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - name: Build gmtui
        working-directory: gmtui
        run: cargo build --release --locked --target ${{ matrix.triple }}
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -C "gmtui/target/${{ matrix.triple }}/release" -czf "gmtui_${{ matrix.target }}.tar.gz" gmtui
          gh release upload "$GITHUB_REF_NAME" "gmtui_${{ matrix.target }}.tar.gz" --clobber
